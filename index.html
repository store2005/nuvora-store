<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>NUVORA Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f5f7;
}

.top{

background:#fff;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.logo{

font-size:28px;
font-weight:bold;

}

.menu{

font-size:28px;

}

.banner img{

width:100%;
display:block;

}

.search{

padding:20px;

}

.search input{

width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#ececec;
font-size:18px;

}

.products{

padding:20px;
display:grid;
grid-template-columns:1fr;
gap:20px;

}

.card{

background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 2px 12px rgba(0,0,0,.08);

}

.card img{

width:100%;
height:210px;
object-fit:cover;

}

.info{

padding:18px;

}

.title{

font-size:22px;
font-weight:bold;

}

.price{

margin-top:10px;
font-size:26px;
font-weight:bold;

}

.btn{

display:block;
margin-top:18px;
padding:15px;
text-align:center;
background:#111827;
color:white;
text-decoration:none;
border-radius:12px;

}

.features{

padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}

.box{

background:white;
padding:25px;
border-radius:18px;
text-align:center;

}

footer{

padding:40px;
text-align:center;
color:#666;

}

</style>

</head>

<body>

<div class="top">

<div class="menu">☰</div>

<div class="logo">
NUVORA
</div>

</div>

<div class="banner">

<img src="A10414EC-3465-47C7-8E92-8B0955E709E2.png">

</div>

<div class="search">

<input placeholder="ابحث عن منتج">

</div>

<div class="products">

<div class="card">

<img src="1FEF97ED-8ED2-4AF6-9B03-967FD992B3C2.png">

<div class="info">

<div class="title">
YouTube Premium
</div>

<div class="price">
4.99 ر.س
</div>

<a class="btn"
href="https://wa.me/966503492992?text=أبغى اشتري YouTube Premium">
شراء الآن
</a>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?q=80&w=1200">

<div class="info">

<div class="title">
Netflix
</div>

<div class="price">
4.99 ر.س
</div>

<a class="btn"
href="https://wa.me/966503492992?text=أبغى اشتري Netflix">
شراء الآن
</a>

</div>

</div>

</div>

<div class="features">

<div class="box">
🔒<br><br>
تسوق آمن
</div>

<div class="box">
⚡<br><br>
تسليم سريع
</div>

<div class="box">
⭐<br><br>
جودة مضمونة
</div>

<div class="box">
💬<br><br>
دعم العملاء
</div>

</div>

<footer>

© 2026 NUVORA

</footer>

</body>

</html>
