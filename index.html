<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NUVORA | Digital Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#07070d;
color:white;
}

.header img{
width:100%;
display:block;
}

.section-title{
text-align:center;
font-size:32px;
margin:35px 0;
color:#d4a55d;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:20px;
}

.card{
background:#12121d;
width:320px;
border-radius:18px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.card img{
width:100%;
height:190px;
object-fit:cover;
}

.card-content{
padding:20px;
text-align:center;
}

.card h3{
margin-bottom:12px;
}

.price{
font-size:24px;
font-weight:bold;
margin-bottom:15px;
color:#d4a55d;
}

.btn{
display:inline-block;
padding:12px 25px;
background:#9c6a2f;
color:white;
text-decoration:none;
border-radius:10px;
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:30px;
max-width:1200px;
margin:auto;
}

.feature{
background:#11111a;
padding:20px;
border-radius:15px;
text-align:center;
}

footer{
padding:30px;
text-align:center;
color:#b7b7b7;
}

@media(max-width:700px){

.card{
width:92%;
}

.section-title{
font-size:24px;
}

}

</style>

</head>
